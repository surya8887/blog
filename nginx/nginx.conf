worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    server {
        listen 80;
        server_name localhost;

        resolver ${NGINX_LOCAL_RESOLVERS} ipv6=off valid=10s;

        # Serve Frontend Static Files
        root /usr/share/nginx/html;
        index index.html;

        # Support React Router
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Local Docker DNS resolver (Required for docker-compose)
        resolver 127.0.0.11 valid=10s;

        # Proxy to Auth Service
        location /api/v1/auth {
            # --- PRODUCTION URLS ---
            # proxy_pass https://outstanding-growth-production-6555.up.railway.app;
            # proxy_ssl_server_name on;
            
            # --- LOCALHOST URLS ---
            set $upstream_auth http://auth-service:5000;
            set $upstream_auth http://auth-service.railway.internal:5000;
            proxy_pass $upstream_auth;
            proxy_set_header Host $host;
            
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/users {
            # proxy_pass https://outstanding-growth-production-6555.up.railway.app;
            # proxy_ssl_server_name on;
            
            set $upstream_auth http://auth-service:5000;
            set $upstream_auth http://auth-service.railway.internal:5000;
            proxy_pass $upstream_auth;
            proxy_set_header Host $host;
            
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/profiles {
            # proxy_pass https://outstanding-growth-production-6555.up.railway.app;
            # proxy_ssl_server_name on;
            
            set $upstream_auth http://auth-service:5000;
            set $upstream_auth http://auth-service.railway.internal:5000;
            proxy_pass $upstream_auth;
            proxy_set_header Host $host;
            
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Proxy to Blog Service
        location /api/v1/posts {
            # proxy_pass https://hopeful-tenderness-production-3e0e.up.railway.app;
            # proxy_ssl_server_name on;
            
            set $upstream_blog http://blog-service:5001;
            set $upstream_blog http://blog-service.railway.internal:5001;
            proxy_pass $upstream_blog;
            proxy_set_header Host $host;
            
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/categories {
            # proxy_pass https://hopeful-tenderness-production-3e0e.up.railway.app;
            # proxy_ssl_server_name on;
            
            set $upstream_blog http://blog-service:5001;
            set $upstream_blog http://blog-service.railway.internal:5001;
            proxy_pass $upstream_blog;
            proxy_set_header Host $host;
            
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/comments {
            # proxy_pass https://hopeful-tenderness-production-3e0e.up.railway.app;
            # proxy_ssl_server_name on;
            
            set $upstream_blog http://blog-service:5001;
            set $upstream_blog http://blog-service.railway.internal:5001;
            proxy_pass $upstream_blog;
            proxy_set_header Host $host;
            
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/likes {
            # proxy_pass https://hopeful-tenderness-production-3e0e.up.railway.app;
            # proxy_ssl_server_name on;
            
            set $upstream_blog http://blog-service:5001;
            set $upstream_blog http://blog-service.railway.internal:5001;
            proxy_pass $upstream_blog;
            proxy_set_header Host $host;
            
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/upload {
            # proxy_pass https://hopeful-tenderness-production-3e0e.up.railway.app;
            # proxy_ssl_server_name on;
            
            set $upstream_blog http://blog-service:5001;
            set $upstream_blog http://blog-service.railway.internal:5001;
            proxy_pass $upstream_blog;
            proxy_set_header Host $host;
            
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
