databases:
  - name: blog-db
    plan: free
    databaseName: blog_users
    user: surya

services:
  - type: web
    name: blog-auth-service
    env: docker
    image:
      imagePath: vijayabout2001/blog_repo:auth-service-v1
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: blog-db
          property: connectionString
      - key: NODE_ENV
        value: production
      # Note: Add JWT, UPSTASH, and FIREBASE environment variables manually in the Render Dashboard after creation for security.

  - type: web
    name: blog-blog-service
    env: docker
    image:
      imagePath: vijayabout2001/blog_repo:blog-service-v1
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 5001
      - key: NODE_ENV
        value: production
      # Note: Add MONGO_URI, JWT, and UPSTASH environment variables manually in the Render Dashboard after creation for security.

  - type: web
    name: blog-frontend
    env: docker
    image:
      imagePath: vijayabout2001/blog_repo:web-v1
    plan: free
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 80
      - key: AUTH_SERVICE_URL
        value: https://blog-repo-auth-service-v1.onrender.com
      - key: BLOG_SERVICE_URL
        value: https://blog-repo-blog-service-v1.onrender.com
