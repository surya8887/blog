version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: blog
    # ports:
    #   - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d blog"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    # ports:
    #   - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongo:
    image: mongo:6
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: .
      target: auth-service
    # ports:
    #   - "5000:5000"
    env_file:
      - apps/auth-service/.env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgresql://root:password@postgres:5432/blog?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=supersecretjwtkeyforauth
      - JWT_EXPIRES_IN=1d
      - JWT_REFRESH_SECRET=supersecretrefreshkey
      - JWT_REFRESH_EXPIRES_IN=7d
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  blog-service:
    build:
      context: .
      target: blog-service
    # ports:
    #   - "5001:5001"
    env_file:
      - apps/blog-service/.env
    environment:
      - NODE_ENV=production
      - PORT=5001
      - MONGO_URI=mongodb://mongo:27017/blog
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=supersecretjwtkeyforauth
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      target: web
    ports:
      - "8080:80"
    depends_on:
      - auth-service
      - blog-service

volumes:
  pgdata:
  redisdata:
  mongodata:
