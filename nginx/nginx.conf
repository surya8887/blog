worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # Use dynamically extracted local resolver for service resolution
    resolver ${NGINX_LOCAL_RESOLVERS} valid=30s;

    server {
        listen 80;
        server_name localhost;

        # Serve Frontend Static Files
        root /usr/share/nginx/html;
        index index.html;

        # Set upstream variables to the Render backend URLs
        set $auth_service "${AUTH_SERVICE_URL}";
        set $blog_service "${BLOG_SERVICE_URL}";
        # Support React Router
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy to Auth Service
        location /api/v1/auth {
            proxy_pass $auth_service;
            proxy_ssl_server_name on;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/users {
            proxy_pass $auth_service;
            proxy_ssl_server_name on;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/profiles {
            proxy_pass $auth_service;
            proxy_ssl_server_name on;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Proxy to Blog Service
        location /api/v1/posts {
            proxy_pass $blog_service;
            proxy_ssl_server_name on;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/categories {
            proxy_pass $blog_service;
            proxy_ssl_server_name on;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/comments {
            proxy_pass $blog_service;
            proxy_ssl_server_name on;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/likes {
            proxy_pass $blog_service;
            proxy_ssl_server_name on;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/upload {
            proxy_pass $blog_service;
            proxy_ssl_server_name on;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
